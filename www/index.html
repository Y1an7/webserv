<!DOCTYPE html>
<!-- Specifies the document type and language / 指定文档类型和语言 -->
<html lang="en">
<head>
    <!-- Character encoding to support standard text / 字符编码以支持标准文本 -->
    <meta charset="UTF-8">
    
    <!-- Viewport settings for mobile responsiveness / 移动端响应式的视口设置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- The title that appears on the browser tab / 显示在浏览器标签页上的标题 -->
    <title>Webserv 42</title>
    
    <!-- Simple embedded CSS for clean formatting / 用于整洁排版的简单内嵌 CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            margin-top: 10vh;
        }
        h1 {
            color: #00babc; /* 42 School Cyan */
        }
        .container {
            border: 1px solid #ccc;
            padding: 40px;
            border-radius: 10px;
            background-color: white;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- The visible content of the page / 页面的可见内容 -->
    <div class="container">
        <h1>Welcome to Webserv!</h1>
        <p>If you are seeing this page, your epoll server is successfully serving static files.</p>
        <p><strong>Method:</strong> GET</p>
        <p><strong>Status:</strong> 200 OK</p>
    </div>

</body>
</html>
